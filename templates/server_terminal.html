<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Terminal — Daily Production Monitor Application</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --muted: #6e7681;
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --dir-color: #79c0ff;
            --file-color: #c9d1d9;
            --sh-color: #56d364;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-sans); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .topbar {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .topbar-logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; color: #f0f6fc; }
        .topbar-sep { color: var(--muted); }
        .topbar-title { font-size: 0.9rem; color: var(--accent); font-family: var(--font-mono); }
        .topbar-right { display: flex; align-items: center; gap: 1rem; }
        .server-badge {
            background: #1f2d1f;
            border: 1px solid #2ea04350;
            color: var(--green);
            font-size: 0.75rem;
            font-family: var(--font-mono);
            padding: 0.2rem 0.65rem;
            border-radius: 9999px;
        }
        .btn-back {
            background: var(--border);
            color: var(--text);
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            font-family: var(--font-sans);
        }
        .btn-back:hover { background: #3c444d; }

        /* Main layout */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar — file tree */
        .sidebar {
            width: 320px;
            min-width: 220px;
            max-width: 420px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            resize: horizontal;
        }

        .sidebar-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .path-bar {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--muted);
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
        }
        .path-crumb {
            color: var(--accent);
            cursor: pointer;
            background: none;
            border: none;
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 0;
        }
        .path-crumb:hover { text-decoration: underline; }
        .path-sep { color: var(--muted); }

        .search-row {
            display: flex;
            gap: 0.4rem;
        }
        .search-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            padding: 0.35rem 0.6rem;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--muted); }
        .btn-search {
            background: var(--accent);
            color: #0d1117;
            border: none;
            border-radius: 6px;
            padding: 0.35rem 0.7rem;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-search:hover { opacity: 0.85; }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.25rem 0;
        }
        .file-list::-webkit-scrollbar { width: 5px; }
        .file-list::-webkit-scrollbar-track { background: transparent; }
        .file-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }

        .file-entry {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 1rem;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            user-select: none;
        }
        .file-entry:hover { background: #21262d; }
        .file-entry.active { background: #1f2d3d; }
        .file-icon { flex-shrink: 0; width: 1rem; text-align: center; font-size: 0.85rem; }
        .file-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .file-name.dir { color: var(--dir-color); }
        .file-name.sh  { color: var(--sh-color); }
        .file-name.file { color: var(--file-color); }
        .file-size { color: var(--muted); font-size: 0.68rem; flex-shrink: 0; }

        .list-status {
            padding: 0.5rem 1rem;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: var(--font-mono);
        }
        .spinner {
            display: inline-block;
            width: 10px; height: 10px;
            border: 2px solid var(--muted);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Main panel */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-toolbar {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            background: #12171e;
        }
        .viewing-path {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--yellow);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .viewing-label { color: var(--muted); font-size: 0.72rem; font-family: var(--font-mono); }
        .btn-sm {
            background: var(--border);
            color: var(--text);
            border: none;
            border-radius: 5px;
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: var(--font-mono);
        }
        .btn-sm:hover { background: #3c444d; }
        .btn-sm.danger { color: var(--red); }

        .file-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text);
        }
        .file-content::-webkit-scrollbar { width: 6px; }
        .file-content::-webkit-scrollbar-track { background: transparent; }
        .file-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }
        .file-content .ln { color: var(--muted); user-select: none; margin-right: 1rem; display: inline-block; min-width: 2.5rem; text-align: right; }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            gap: 0.5rem;
        }
        .empty-icon { font-size: 2.5rem; opacity: 0.3; }

        /* Terminal panel */
        .term-panel {
            height: 220px;
            min-height: 120px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #0a0e14;
            flex-shrink: 0;
        }
        .term-header {
            padding: 0.4rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }
        .term-title { font-size: 0.72rem; color: var(--muted); font-family: var(--font-mono); flex: 1; }
        .term-output {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 1rem;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: #8b949e;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .term-output::-webkit-scrollbar { width: 4px; }
        .term-output::-webkit-scrollbar-thumb { background: var(--border); }
        .term-input-row {
            display: flex;
            align-items: center;
            padding: 0.4rem 1rem;
            border-top: 1px solid var(--border);
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .term-prompt { color: var(--green); font-family: var(--font-mono); font-size: 0.78rem; flex-shrink: 0; }
        .term-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            caret-color: var(--green);
        }
        .term-run {
            background: #1a2e1a;
            border: 1px solid var(--green);
            color: var(--green);
            border-radius: 5px;
            padding: 0.25rem 0.65rem;
            font-size: 0.72rem;
            cursor: pointer;
            font-family: var(--font-mono);
        }
        .term-run:hover { background: #2a3f2a; }

        /* Search results overlay */
        .search-results {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--panel);
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .search-results-header {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .search-results-title { font-size: 0.8rem; color: var(--accent); font-family: var(--font-mono); flex: 1; }
        .search-results-list { flex: 1; overflow-y: auto; padding: 0.25rem 0; }
        .search-result-item {
            padding: 0.35rem 1rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .search-result-item:hover { background: #21262d; }
        .search-result-item .sr-dir { color: var(--muted); }
        .search-result-item .sr-name { color: var(--accent); }
        .no-results { padding: 1rem; color: var(--muted); font-family: var(--font-mono); font-size: 0.78rem; }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
    <div class="topbar-left">
        <span class="topbar-logo">Daily Production Monitor</span>
        <span class="topbar-sep">/</span>
        <span class="topbar-title">Server File Browser</span>
    </div>
    <div class="topbar-right">
        <span class="server-badge">● eapcprod@54.176.67.86</span>
        <a href="/dashboard" class="btn-back">← Dashboard</a>
        <a href="/logout" class="btn-back">Logout</a>
    </div>
</div>

<!-- Workspace -->
<div class="workspace">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="path-bar" id="breadcrumb"></div>
            <div class="search-row">
                <input type="text" class="search-input" id="searchInput" placeholder="Search files...">
                <button class="btn-search" id="searchBtn">Find</button>
            </div>
        </div>
        <div style="position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;">
            <div class="file-list" id="fileList"></div>
            <!-- Search results overlay -->
            <div class="search-results" id="searchResults" style="display:none;">
                <div class="search-results-header">
                    <span class="search-results-title" id="searchResultsTitle">Results</span>
                    <button class="btn-sm" id="closeSearch">✕ Close</button>
                </div>
                <div class="search-results-list" id="searchResultsList"></div>
            </div>
        </div>
        <div class="list-status" id="listStatus"></div>
    </div>

    <!-- Main panel -->
    <div class="main-panel">
        <div class="main-toolbar">
            <span class="viewing-label">Viewing:</span>
            <span class="viewing-path" id="viewingPath">— select a file —</span>
            <button class="btn-sm" id="refreshBtn" title="Refresh directory">↺ Refresh</button>
            <button class="btn-sm" id="copyPathBtn" title="Copy path">⎘ Copy Path</button>
        </div>
        <div class="file-content" id="fileContent">
            <div class="empty-state">
                <div class="empty-icon">📂</div>
                <div>Select a file to view its contents</div>
                <div style="font-size:0.72rem;margin-top:0.25rem;opacity:0.6;">Click any file in the sidebar</div>
            </div>
        </div>
        <!-- Terminal -->
        <div class="term-panel">
            <div class="term-header">
                <span class="term-title">$ terminal — run commands on eapcprod@54.176.67.86</span>
                <button class="btn-sm" id="clearTermBtn">Clear</button>
            </div>
            <div class="term-output" id="termOutput"></div>
            <div class="term-input-row">
                <span class="term-prompt" id="termPrompt">eapcprod@eapcprod:~$</span>
                <input type="text" class="term-input" id="termInput" placeholder="type a command and press Enter..." autocomplete="off" spellcheck="false">
                <button class="term-run" id="termRun">Run</button>
            </div>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='js/server_terminal.js') }}"></script>
</body>
</html>
